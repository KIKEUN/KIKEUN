<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAYDAY VOL3 · 마음을 담은 포토카드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link
        rel="stylesheet"
        crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-body:
                'Pretendard',
                -apple-system,
                BlinkMacSystemFont,
                'Segoe UI',
                Roboto,
                'Helvetica Neue',
                'Apple SD Gothic Neo',
                'Noto Sans KR',
                'Malgun Gothic',
                sans-serif;
            --font-korean-serif: 'Gowun Batang', 'Cormorant Garamond', serif;
            --font-display: 'Cormorant Garamond', 'Gowun Batang', serif;
        }

        html {
            background: #fbf3ea;
        }

        html,
        body {
            font-family: var(--font-body) !important;
        }

        /* 한글 세리프 — 메인 헤드라인/카드 타이틀 */
        .glass-hero-title,
        .font-korean-serif {
            font-family: var(--font-korean-serif) !important;
            letter-spacing: -0.01em;
        }

        /* 강조 키워드 — 한글 세리프(굵게) */
        .hero-keyword-photocard {
            font-family: var(--font-korean-serif) !important;
        }

        /* 이탤릭 액센트 — 영문 디스플레이 세리프 */
        .font-display-italic,
        em.font-display-italic {
            font-family: var(--font-display) !important;
            font-style: italic;
            font-weight: 500;
        }

        body {
            color: #2b1a12;
            overflow-x: hidden;
            min-height: 100vh;
            background: #fbf3ea;
        }

        /* 바깥 카드 — 밝은 크림·연한 살구 (참고 이미지 톤) */
        .ai97-surface {
            position: relative;
            background-color: #fbf1e6;
            background-image:
                radial-gradient(ellipse 95% 55% at 80% 88%, rgba(247, 200, 175, 0.55) 0%, transparent 60%),
                radial-gradient(ellipse 80% 50% at 12% 18%, rgba(255, 237, 220, 0.75) 0%, transparent 65%),
                linear-gradient(
                    180deg,
                    #fdf6ee 0%,
                    #fbf1e6 55%,
                    #f7e7d6 100%
                );
            box-shadow:
                0 24px 60px -18px rgba(193, 110, 74, 0.22),
                0 1px 0 rgba(255, 255, 255, 0.6) inset;
        }

        /* 안내 박스 — 거의 흰색에 살구 라인 */
        .glass-panel {
            background: linear-gradient(
                180deg,
                #ffffff 0%,
                #fff7ee 100%
            );
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(214, 142, 100, 0.28);
            box-shadow:
                0 12px 28px -16px rgba(193, 110, 74, 0.22),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }

        .hero-keyword-photocard {
            color: #c2410c;
            font-weight: 900;
        }

        .tag-pill {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: background 0.2s;
        }
        .tag-pill:hover {
            background: rgba(255, 255, 255, 0.85);
        }

        .glass-hero-title {
            letter-spacing: -0.03em;
            text-shadow: none;
        }

        .story-textarea {
            width: 100%;
            min-height: 4.5rem;
            resize: vertical;
            border-radius: 0.625rem;
            border: 1px solid rgba(251, 146, 60, 0.55);
            background: #ffffff;
            padding: 0.85rem 1rem;
            font-size: 0.9375rem;
            line-height: 1.55;
            color: #1e293b;
            box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.03);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .story-textarea::placeholder {
            color: rgb(148 163 184);
        }

        .story-textarea:focus {
            outline: none;
            border-color: rgba(234, 88, 12, 0.55);
            box-shadow:
                inset 0 1px 2px rgba(15, 23, 42, 0.04),
                0 0 0 3px rgba(253, 186, 116, 0.55);
        }

        .receiver-input {
            width: 100%;
            border-radius: 0.625rem;
            border: 1px solid rgba(251, 146, 60, 0.55);
            background: #ffffff;
            padding: 0.75rem 1rem 0.75rem 2.6rem;
            font-size: 0.95rem;
            color: #1e293b;
            box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.03);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .receiver-input::placeholder {
            color: rgb(148 163 184);
        }

        .receiver-input:focus {
            outline: none;
            border-color: rgba(234, 88, 12, 0.55);
            box-shadow:
                inset 0 1px 2px rgba(15, 23, 42, 0.04),
                0 0 0 3px rgba(253, 186, 116, 0.55);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeInUp 0.7s ease both; }
        .fade-in-d1 { animation-delay: 0.15s; }
        .fade-in-d2 { animation-delay: 0.3s; }
        .fade-in-d3 { animation-delay: 0.45s; }
        .fade-in-d4 { animation-delay: 0.6s; }

        .playday-logo {
            mix-blend-mode: multiply;
            vertical-align: middle;
        }

        /* CTA 버튼 (vol2와 동일 톤) */
        .btn-webtoon-create,
        .btn-playgallery {
            position: relative;
            isolation: isolate;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            width: 100%;
            max-width: 20rem;
            font-size: 1.02rem;
            font-weight: 800;
            letter-spacing: -0.015em;
            color: #fffbeb;
            padding: 0.92rem 1.2rem;
            border-radius: 9999px;
            cursor: pointer;
            text-decoration: none;
            transition:
                transform 0.2s ease,
                box-shadow 0.2s ease,
                filter 0.2s ease,
                border-color 0.2s ease,
                background 0.2s ease;
        }

        .btn-webtoon-create::before {
            content: "";
            position: absolute;
            inset: 1px;
            border-radius: inherit;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.02) 42%, rgba(255, 255, 255, 0) 100%);
            pointer-events: none;
        }

        .btn-webtoon-create {
            background: linear-gradient(145deg, #d97757 0%, #c2410c 50%, #9a3412 100%);
            border: 1px solid rgba(254, 215, 170, 0.7);
            box-shadow:
                0 5px 0 #7c2d12,
                0 14px 28px -6px rgba(124, 45, 18, 0.32),
                0 4px 16px rgba(217, 119, 6, 0.22);
        }

        .btn-webtoon-create:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
            border-color: rgba(255, 237, 213, 0.85);
            box-shadow:
                0 7px 0 #7c2d12,
                0 18px 34px -6px rgba(124, 45, 18, 0.3),
                0 6px 18px rgba(217, 119, 6, 0.25);
        }

        .btn-webtoon-create:active {
            transform: translateY(3px);
            filter: brightness(0.97);
            box-shadow:
                0 2px 0 #7c2d12,
                0 6px 14px rgba(67, 20, 7, 0.35);
        }

        .btn-playgallery {
            border: 1px solid rgba(214, 142, 100, 0.45);
            background: linear-gradient(145deg, #ffffff 0%, #fff7ed 100%);
            color: #7c2d12;
            box-shadow:
                0 5px 0 #c98567,
                0 12px 24px -8px rgba(193, 110, 74, 0.25),
                0 4px 14px rgba(214, 142, 100, 0.18);
        }

        .btn-playgallery:hover {
            transform: translateY(-2px);
            filter: brightness(1.02);
            border-color: rgba(193, 110, 74, 0.55);
            box-shadow:
                0 7px 0 #c98567,
                0 16px 30px -8px rgba(193, 110, 74, 0.28),
                0 6px 18px rgba(214, 142, 100, 0.22);
        }

        .btn-playgallery:active {
            transform: translateY(3px);
            filter: brightness(0.98);
            box-shadow:
                0 2px 0 #c98567,
                0 5px 12px rgba(193, 110, 74, 0.3);
        }

        .hero-cta-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.75rem;
            width: 100%;
            max-width: 34rem;
            margin: 0 auto;
            align-items: stretch;
        }

        @media (max-width: 520px) {
            .hero-cta-row {
                grid-template-columns: 1fr;
            }
        }

        .hero-cta-row > .btn-webtoon-create,
        .hero-cta-row > .btn-playgallery {
            width: 100%;
            min-width: 0;
            max-width: none;
        }

        .hero-cta-emoji,
        .hero-cta-arrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }

        .hero-cta-emoji {
            width: 1.85rem;
            height: 1.85rem;
            font-size: 1.2rem;
            line-height: 1;
        }

        .hero-cta-arrow {
            width: 1.95rem;
            height: 1.95rem;
            box-sizing: border-box;
            padding: 0;
            line-height: 1;
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.22),
                0 2px 8px rgba(67, 20, 7, 0.2);
            transition:
                transform 0.2s ease,
                background 0.2s ease,
                border-color 0.2s ease;
        }

        .btn-playgallery .hero-cta-arrow {
            background: rgba(194, 65, 12, 0.08);
            border: 1px solid rgba(194, 65, 12, 0.22);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.6),
                0 2px 8px rgba(193, 110, 74, 0.15);
        }

        .btn-playgallery .hero-cta-arrow i {
            color: #9a3412;
        }

        .hero-cta-arrow i {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            font-size: 0.8rem;
            transform: translateX(0.06em);
        }

        .hero-cta-label {
            position: relative;
            z-index: 1;
            text-align: center;
            letter-spacing: -0.01em;
            white-space: nowrap;
            font-size: clamp(0.82rem, 1.65vw, 1.02rem);
        }

        .group:hover .hero-cta-arrow {
            transform: translateX(3px);
            background: rgba(255, 255, 255, 0.22);
            border-color: rgba(255, 255, 255, 0.24);
        }

        .btn-playgallery.group:hover .hero-cta-arrow {
            background: rgba(194, 65, 12, 0.14);
            border-color: rgba(194, 65, 12, 0.3);
        }

        /* ---------- 샘플 이미지 — 부채(폴라로이드) 스택 ---------- */
        .preview-gallery {
            display: flex;
            flex-wrap: nowrap;
            justify-content: center;
            align-items: flex-end;
            gap: 0;
            max-width: 52rem;
            margin-left: auto;
            margin-right: auto;
            min-height: 21rem;
            padding: 1.35rem 0.75rem 2rem;
            position: relative;
        }

        .preview-gallery__item {
            position: relative;
            flex: 0 0 auto;
            width: clamp(9.75rem, 34vw, 16.25rem);
            margin: 0 clamp(-2.55rem, -6.5vw, -2rem);
            background: #ffffff;
            padding: 0.65rem 0.65rem 1.55rem 0.65rem;
            border-radius: 0.45rem;
            border: 1px solid rgba(15, 23, 42, 0.07);
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.9) inset,
                0 14px 32px -6px rgba(15, 23, 42, 0.28);
            transition:
                transform 0.42s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.35s ease;
            z-index: 1;
        }

        .preview-gallery__item--fan-left {
            transform: rotate(-13deg) translateY(0.35rem);
            z-index: 1;
        }

        .preview-gallery__item--fan-center {
            transform: rotate(-1deg) translateY(-0.65rem) scale(1.05);
            z-index: 3;
        }

        .preview-gallery__item--fan-right {
            transform: rotate(13deg) translateY(0.35rem);
            z-index: 2;
        }

        .preview-gallery__item:hover {
            z-index: 8;
            transition:
                transform 0.38s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.3s ease;
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.95) inset,
                0 22px 44px -4px rgba(15, 23, 42, 0.32);
        }

        .preview-gallery__item--fan-left:hover {
            transform: rotate(-13deg) translateY(0.2rem) scale(1.06);
        }

        .preview-gallery__item--fan-center:hover {
            transform: rotate(-1deg) translateY(-0.85rem) scale(1.1);
        }

        .preview-gallery__item--fan-right:hover {
            transform: rotate(13deg) translateY(0.2rem) scale(1.06);
        }

        .preview-gallery__img {
            display: block;
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 0.18rem;
            vertical-align: middle;
        }

        @media (max-width: 520px) {
            .preview-gallery {
                min-height: 16rem;
                padding: 1.1rem 0.2rem 1.65rem;
            }

            .preview-gallery__item {
                width: 9rem;
                margin: 0 -1.55rem;
                padding: 0.45rem 0.45rem 1.2rem 0.45rem;
            }

            .preview-gallery__item--fan-left {
                transform: rotate(-11deg) translateY(0.25rem);
            }

            .preview-gallery__item--fan-center {
                transform: rotate(-1deg) translateY(-0.45rem) scale(1.03);
            }

            .preview-gallery__item--fan-right {
                transform: rotate(11deg) translateY(0.25rem);
            }

            .preview-gallery__item--fan-left:hover {
                transform: rotate(-11deg) translateY(0.15rem) scale(1.04);
            }

            .preview-gallery__item--fan-center:hover {
                transform: rotate(-1deg) translateY(-0.55rem) scale(1.06);
            }

            .preview-gallery__item--fan-right:hover {
                transform: rotate(11deg) translateY(0.15rem) scale(1.04);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .preview-gallery__item {
                transition: none;
            }
        }
        .step-card {
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.28);
            border-radius: 1.25rem;
            padding: 1.1rem 1rem;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .step-card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.22);
        }

        .step-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2rem;
            height: 2rem;
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.95);
            color: #c2410c;
            font-weight: 900;
            font-size: 0.95rem;
            box-shadow: 0 2px 8px rgba(194, 65, 12, 0.2);
        }
    </style>
</head>
<body>

    <main class="max-w-3xl mx-auto px-4 pt-2 pb-6">
        <div class="ai97-surface rounded-3xl px-5 sm:px-8 pt-0 sm:pt-1 pb-14">

            <!-- 헤더 -->
            <div class="text-center fade-in relative">
                <p class="tracking-[0.35em] text-sm mb-0 text-[#c98567] leading-none inline-block translate-y-8">✦ ✦ ✦ ✦ ✦ ✦</p>
                <h1 class="mt-0 mb-0 flex justify-center px-2">
                    <img src="https://kikeun.github.io/KIKEUN/ai31.png" alt="PLAYDAY" class="playday-logo translate-y-4 sm:translate-y-5 h-32 sm:h-36 md:h-40 w-auto max-w-[min(100%,680px)] object-contain" width="500" height="125" decoding="async">
                </h1>
                <hr class="border-0 border-t border-[#e8c7b0] max-w-xl sm:max-w-2xl mx-auto -mt-2 sm:-mt-3 mb-6">
            </div>

            <!-- 글래스 카드 (헤드 카피) -->
            <section class="glass-panel rounded-3xl px-6 sm:px-8 py-6 sm:py-7 text-center mx-auto w-full max-w-2xl fade-in fade-in-d1">
                <h2 class="glass-hero-title text-[1.5rem] sm:text-[1.7rem] md:text-[1.95rem] font-black text-[#2b1a12] mb-2 leading-snug">
                    감사한 마음을 <span class="hero-keyword-photocard">포토카드</span>에 담아 전해보세요.
                </h2>
                <p class="text-[1.05rem] sm:text-[1.12rem] md:text-[1.2rem] leading-relaxed text-[#6b4630] font-semibold mb-0">
                    평소 표현하지 못한 고마움을,<br>
                    AI와 함께 포토카드로 따뜻한 마음을 전달해 보세요.
                </p>
            </section>

            <!-- 샘플 포토카드 이미지 (박스 없음) -->
            <div class="preview-gallery fade-in fade-in-d2 w-full max-w-3xl mx-auto mt-4 px-2 sm:px-4" role="group" aria-label="포토카드 샘플 이미지">
                <figure class="preview-gallery__item preview-gallery__item--fan-left">
                    <img class="preview-gallery__img" src="https://kikeun.github.io/KIKEUN/ai21.png" alt="포토카드 예시 이미지 1" width="512" height="512" decoding="async" loading="lazy">
                </figure>
                <figure class="preview-gallery__item preview-gallery__item--fan-center">
                    <img class="preview-gallery__img" src="https://kikeun.github.io/KIKEUN/ai22.png" alt="포토카드 예시 이미지 2" width="512" height="512" decoding="async" loading="lazy">
                </figure>
                <figure class="preview-gallery__item preview-gallery__item--fan-right">
                    <img class="preview-gallery__img" src="https://kikeun.github.io/KIKEUN/ai23.png" alt="포토카드 예시 이미지 3" width="512" height="512" decoding="async" loading="lazy">
                </figure>
            </div>

            <!-- CTA (박스 없음 — 버튼만) -->
            <section class="px-6 sm:px-8 py-4 sm:py-5 text-center mx-auto w-full max-w-2xl fade-in fade-in-d3 mt-3 mb-2">
                <div class="hero-cta-row">
                    <button type="button" id="btnPhotocardCreate" class="btn-webtoon-create group">
                        <span class="hero-cta-emoji" aria-hidden="true">💌</span>
                        <span class="hero-cta-label">포토카드 만들기</span>
                        <span class="hero-cta-arrow" aria-hidden="true"><i class="fas fa-arrow-right"></i></span>
                    </button>
                    <a href="#gallery" class="btn-playgallery group" aria-label="동료들이 보낸 포토카드 보러가기">
                        <span class="hero-cta-emoji" aria-hidden="true">🖼️</span>
                        <span class="hero-cta-label">동료 사연 보러가기</span>
                        <span class="hero-cta-arrow" aria-hidden="true"><i class="fas fa-arrow-right"></i></span>
                    </a>
                </div>
            </section>

            <!-- 인용 -->
            <p class="font-korean-serif text-center text-xl md:text-2xl font-bold italic text-[#7c2d12] mt-7 px-3 fade-in fade-in-d4 leading-snug">
                "누구에게 마음을 전하고 싶나요?"
            </p>

            <!-- 푸터 -->
            <footer class="text-center mt-12 border-t border-[#e8c7b0] pt-7">
                <div class="flex flex-wrap items-center justify-center gap-x-1.5 gap-y-1.5 text-xs md:text-sm font-bold text-[#7c4a30]">
                    <span class="text-[#9a6444] font-semibold">워크이노베이션센터</span>
                    <span class="text-[#d6b6a0]" aria-hidden="true">│</span>
                    <span class="inline-flex items-center gap-1.5">
                        <svg class="h-5 w-5 shrink-0 text-[#7c4a30]" width="20" height="20" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <path d="M12 45L28 35V80L12 90V45Z" fill="currentColor" />
                            <path d="M28 5 L82 32 V48 L38 70 V54 L66 40 L28 21 V5 Z" fill="currentColor" />
                        </svg>
                        <span>AI디자인랩</span>
                    </span>
                </div>
                <p class="text-xs text-[#a07658] mt-3">© PLAYDAY VOL3 · Thanks Photocard Concept</p>
            </footer>
        </div>
    </main>

    <script>
        (function () {
            var btn = document.getElementById('btnPhotocardCreate');
            if (btn) {
                btn.addEventListener('click', function () {
                    try {
                        sessionStorage.setItem('PLAYDAY_PHOTOCARD_TO', '');
                        sessionStorage.setItem('PLAYDAY_PHOTOCARD_MSG', '');
                    } catch (e) {}
                    window.location.href = 'https://kikeun.github.io/KIKEUN/vol3.1.html';
                });
            }
        })();
    </script>
</body>
</html>
